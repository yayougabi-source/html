<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart HSE Analyzer - نظام تصاريح العمل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .modal { transition: opacity 0.25s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-slate-900 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight flex items-center">
                <i class="fas fa-shield-halved ml-2 text-red-500"></i> Smart HSE Analyzer
            </h1>
            <span class="text-xs bg-red-600 px-3 py-1 rounded-full animate-pulse">ATEX COMPLIANT</span>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-6">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold text-slate-800">نظام إصدار التصاريح (PTW)</h2>
            <p class="text-gray-500 mt-2">وحدة التحكم في الأعمال الساخنة والمخاطر الكبرى</p>
        </div>

        <div class="max-w-md mx-auto">
            <button onclick="toggleModal()" class="w-full bg-white p-8 rounded-3xl shadow-lg hover:shadow-2xl transition-all border-r-8 border-red-600 flex flex-col items-center">
                <div class="w-20 h-20 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center text-4xl mb-4">
                    <i class="fas fa-burn"></i>
                </div>
                <h3 class="text-2xl font-bold text-slate-800 uppercase">Permit à chaud</h3>
                <p class="text-red-500 font-bold mt-2 text-sm italic">اضغط لبدء فحص الغاز وإصدار التصريح</p>
            </button>
        </div>
    </main>

    <div id="modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50 p-4">
        <div class="modal-overlay absolute w-full h-full bg-slate-900 opacity-70"></div>
        
        <div class="modal-container bg-white w-full max-w-2xl mx-auto rounded-2xl shadow-2xl z-50 overflow-y-auto max-h-[95vh]">
            <div class="modal-content py-6 px-8 text-right">
                <div class="flex justify-between items-center pb-4 border-b">
                    <div class="text-right">
                        <p class="text-2xl font-bold text-red-700">تحليل مخاطر العمل الساخن</p>
                        <p class="text-xs text-gray-400">ID: PTW-2026-ALGERIA</p>
                    </div>
                    <div onclick="toggleModal()" class="cursor-pointer p-2 hover:bg-gray-100 rounded-full">
                        <i class="fas fa-times text-gray-500"></i>
                    </div>
                </div>

                <form class="mt-6 space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-700 font-bold mb-1">الموقع العملي (Location)</label>
                            <select class="w-full p-3 border-2 border-gray-100 rounded-xl focus:border-red-500 outline-none bg-gray-50">
                                <option>Décanteur lamellaire</option>
                                <option>Captage</option>
                                <option>Bloc ADM</option>
                                <option>Zone de Stockage (Sphères)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-700 font-bold mb-1">المشرف المسؤول</label>
                            <input type="text" placeholder="اسم المهندس المشرف" class="w-full p-3 border-2 border-gray-100 rounded-xl outline-none bg-gray-50">
                        </div>
                    </div>

                    <div class="bg-slate-800 p-6 rounded-2xl text-white">
                        <h4 class="font-bold mb-4 flex items-center text-yellow-400">
                            <i class="fas fa-gas-pump ml-2"></i> نتائج جهاز فحص الغاز (Gas Detector)
                        </h4>
                        <div class="grid grid-cols-3 gap-4">
                            <div class="text-center">
                                <label class="block text-xs mb-1">Oxygen (O2 %)</label>
                                <input type="number" step="0.1" placeholder="20.9" class="w-full p-2 rounded bg-slate-700 border border-slate-600 text-center text-green-400 font-bold">
                            </div>
                            <div class="text-center">
                                <label class="block text-xs mb-1">LEL (%)</label>
                                <input type="number" placeholder="0" class="w-full p-2 rounded bg-slate-700 border border-slate-600 text-center text-red-400 font-bold">
                            </div>
                            <div class="text-center">
                                <label class="block text-xs mb-1">H2S (ppm)</label>
                                <input type="number" placeholder="0" class="w-full p-2 rounded bg-slate-700 border border-slate-600 text-center text-yellow-400 font-bold">
                            </div>
                        </div>
                        <p class="text-[10px] mt-3 text-gray-400 text-center">* يجب ألا تتجاوز نسبة LEL الـ 0% للأعمال الساخنة</p>
                    </div>

                    <div>
                        <label class="block text-gray-700 font-bold mb-3">تحليل المخاطر الفوري (EVRP)</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="flex items-center p-3 border rounded-xl hover:bg-red-50 cursor-pointer transition">
                                <input type="checkbox" class="ml-2 w-4 h-4 accent-red-600"> شرر متطاير
                            </label>
                            <label class="flex items-center p-3 border rounded-xl hover:bg-red-50 cursor-pointer transition">
                                <input type="checkbox" class="ml-2 w-4 h-4 accent-red-600"> إشعاع حراري
                            </label>
                            <label class="flex items-center p-3 border rounded-xl hover:bg-red-50 cursor-pointer transition">
                                <input type="checkbox" class="ml-2 w-4 h-4 accent-red-600"> انفجار محتمل
                            </label>
                            <label class="flex items-center p-3 border rounded-xl hover:bg-red-50 cursor-pointer transition">
                                <input type="checkbox" class="ml-2 w-4 h-4 accent-red-600"> غازات خانقة
                            </label>
                        </div>
                    </div>

                    <button type="button" onclick="alert('جاري توليد التصريح ونقله لقاعدة البيانات...')" class="w-full bg-red-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-red-700 transform active:scale-95 transition">
                        توليد تصريح عمل آمن (Confirm PTW)
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function toggleModal () {
            const body = document.querySelector('body')
            const modal = document.getElementById('modal')
            modal.classList.toggle('opacity-0')
            modal.classList.toggle('pointer-events-auto')
        }
    </script>
</body>
</html>
